<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 200 200">
  <defs>
    <pattern id="dottedMesh" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <!-- dots -->
      <circle cx="2" cy="2" r="1.5" fill="black" />
      <!-- connecting lines -->
      <line x1="2" y1="2" x2="20" y2="2" stroke="black" stroke-width="0.3" stroke-dasharray="1,3"/>
      <line x1="2" y1="2" x2="2" y2="20" stroke="black" stroke-width="0.3" stroke-dasharray="1,3"/>
    </pattern>
  </defs>

  <!-- transparent background by default -->
  <rect width="100%" height="100%" fill="url(#dottedMesh)" />
</svg>